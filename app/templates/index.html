{% extends "base.html" %}
{% block content %}
    <h1>To-Do List</h1>

    <form action="{{ url_for('add_task') }}" method="post" class="add-form">
        <input type="text" name="title" placeholder="What needs to be done?" required autofocus>
        <button type="submit">Add</button>
    </form>

    {% if tasks %}
    <ul class="task-list">
        {% for task in tasks %}
        <li class="{{ 'done' if task.done else '' }}">
            <form action="{{ url_for('toggle_task', task_id=task.id) }}" method="post" class="toggle-form">
                <button type="submit" class="check-btn" aria-label="Toggle done">
                    {{ '✔' if task.done else '○' }}
                </button>
            </form>
            <span class="title">{{ task.title }}</span>
            <form action="{{ url_for('delete_task', task_id=task.id) }}" method="post" class="delete-form">
                <button type="submit" class="delete-btn" aria-label="Delete task">✕</button>
            </form>
        </li>
        {% endfor %}
    </ul>
    {% else %}
    <p class="empty-state">No tasks yet — add one above.</p>
    {% endif %}
{% endblock %}
